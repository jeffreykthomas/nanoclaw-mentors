name: Sync with upstream

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: fork-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream main
        id: sync
        run: |
          git remote add upstream https://github.com/qwibitai/nanoclaw.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream."
            echo "synced=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge upstream/main --no-edit; then
            echo "::error::Merge conflict with upstream/main"
            git merge --abort
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm ci
          if ! npm run build; then
            echo "::error::Build failed after upstream merge"
            git reset --hard origin/main
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "sync_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin main
          echo "synced=true" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: steps.sync.outputs.sync_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed — resolve manually',
              body: [
                'The automated sync with `qwibitai/nanoclaw` failed (merge conflict or build failure).',
                '',
                'To resolve:',
                '```bash',
                'git fetch upstream main',
                'git merge upstream/main',
                '# resolve conflicts',
                'npm run build',
                'git push',
                '```',
              ].join('\n'),
              labels: ['upstream-sync'],
            });
